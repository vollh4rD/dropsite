<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>drop</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- Gate: visible by default, hidden by auth.js when token is valid -->
<div id="gate" style="display:none">
    <div class="gate-logo">drop/</div>
    <div class="gate-input-row">
        <input
            type="password"
            id="gatePasswordInput"
            class="gate-input"
            placeholder="password"
            maxlength="8"
            autocomplete="off"
            spellcheck="false"
        >
        <button class="btn primary" id="gateSubmit">enter</button>
    </div>
    <div class="gate-error" id="gateError"></div>
</div>

<!-- App: hidden by default, revealed by auth.js when token is valid -->
<div id="appRoot" style="display:none">

<header>
    <div class="logo">drop/</div>

    <div class="subtitle">
        shared files + clipboard
    </div>
</header>

<main class="split-layout">

    <section class="pane">

        <h3>files</h3>

        <div class="drop-zone" id="dropZone">

            <input
                type="file"
                id="fileInput"
                multiple
            >

            <div class="drop-label">
                drop files here or
                <span>browse</span>
            </div>

        </div>

        <div
            class="file-list"
            id="fileList"
        ></div>

    </section>

    <section class="pane">

        <h3>clipboard</h3>

        <textarea
            id="clipInput"
            placeholder="paste anything..."
        ></textarea>

        <div class="clip-actions">

            <button
                class="btn primary"
                id="saveClipBtn"
            >
                save
            </button>

            <button
                class="btn"
                id="clearClipBtn"
            >
                clear
            </button>

        </div>

        <div
            class="clipboard-list"
            id="clipboardList"
        ></div>

</section>

</main>

</div> <!-- end appRoot -->

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/clipboard.js"></script>
<script src="js/files.js"></script>

</body>
</html>
